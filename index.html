<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prázdniny</title>
  <link rel="stylesheet" href="/prazdniny/style.css">
  <script src="/prazdniny/script.js"></script>
  <script src="/prazdniny/sw.js"></script>
  <link rel="manifest" href="/prazdniny/manifest.json">
  <link rel="icon" type="icon" href="/prazdniny/favicon.png">
</head>

<body>
  <img src="/prazdniny/logo.png" alt="Image" id="time-image">
  <div id="time-display" class="time-display"></div>

  <div id="gradient-container">
    <div class="gradient"></div>
  </div>
  
  <div id="nadpis">Prázdniny</div>
  <div class="okres-zmena-kontejner">
    <span id="aktualni-okres-text"></span>
    <button id="hlavni-zmenit-okres-btn">Změnít</button>
  </div>
  
  <div id="prazdniny-list"></div>

  <div id="info-overlay">
    <div id="info-box">
      <h2 id="info-title">Podrobnosti</h2>
      <p id="info-content"></p>
    </div>
  </div>

  <div id="okres-overlay">
    <div id="okres-box">
      <h3>Vyber svůj okres</h3>
      <select id="okres-select">
        </select>
      <button id="okres-submit">Uložit</button>
    </div>
  </div>

    </div>
  </div>

  <div class="snowflakes" id="snowflakes-container"></div>
</body>

</html>
